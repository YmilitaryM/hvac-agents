name: Nightly
on:
  schedule:
    - cron: "0 5 * * *"

jobs:
  full-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: hvac
          POSTGRES_PASSWORD: hvac_dev
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run mypy common/ services/
      - run: uv run pytest --cov --cov-report=xml -v --durations=10
      - run: uv run bandit -r services/ common/ -ll || true
      - run: uv run pip-audit || true
