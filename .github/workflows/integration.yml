name: Integration
on:
  push:
    branches: [master]
  schedule:
    - cron: "0 3 * * *"

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          docker compose build
          docker compose up -d
          sleep 30
          curl -f http://localhost:8000/health
          docker compose exec -T gateway uv run pytest tests/integration/ -v
      - name: Teardown
        if: always()
        run: docker compose down -v
