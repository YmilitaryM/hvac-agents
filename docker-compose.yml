version: "3.9"
services:
  postgres_asset:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: asset_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5433:5432"]
    volumes: [pg_asset:/var/lib/postgresql/data]

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: env_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5434:5432"]
    volumes: [tsdb:/var/lib/postgresql/data]

  postgres_sim:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sim_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5435:5432"]
    volumes: [pg_sim:/var/lib/postgresql/data]

  postgres_agent:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5436:5432"]
    volumes: [pg_agent:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  asset_service:
    build: services/asset
    ports: ["8001:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@postgres_asset:5432/asset_db
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres_asset, redis]

  env_service:
    build: services/environment
    ports: ["8002:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@timescaledb:5432/env_db
    depends_on: [timescaledb]

  sim_service:
    build: services/simulation
    ports: ["8003:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@postgres_sim:5432/sim_db
      ASSET_SERVICE_URL: http://asset_service:8000
      ENV_SERVICE_URL: http://env_service:8000
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres_sim, redis]

  agent_service:
    build: services/agent
    ports: ["8004:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@postgres_agent:5432/agent_db
      SIM_SERVICE_URL: http://sim_service:8000
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres_agent, redis]

  gateway:
    build: services/gateway
    ports: ["8000:8000"]
    environment:
      ASSET_SERVICE_URL: http://asset_service:8000
      ENV_SERVICE_URL: http://env_service:8000
      SIM_SERVICE_URL: http://sim_service:8000
      AGENT_SERVICE_URL: http://agent_service:8000
      JWT_SECRET: dev-secret-change-in-prod
    depends_on: [asset_service, env_service, sim_service, agent_service]

volumes:
  pg_asset: ~
  tsdb: ~
  pg_sim: ~
  pg_agent: ~
