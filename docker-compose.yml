services:
  postgres_asset:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: asset_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5433:5432"]
    volumes: [pg_asset:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac -d asset_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: env_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5434:5432"]
    volumes: [tsdb:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac -d env_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_sim:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sim_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5435:5432"]
    volumes: [pg_sim:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac -d sim_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_agent:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5436:5432"]
    volumes: [pg_agent:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescaledb_acq:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: acq_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5439:5432"]
    volumes: [tsdb_acq:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac -d acq_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  acquisition_service:
    build:
      context: .
      dockerfile: services/acquisition/Dockerfile
    ports: ["8005:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@timescaledb_acq:5432/acq_db
      ASSET_SERVICE_URL: http://asset_service:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      timescaledb_acq:
        condition: service_healthy
      redis:
        condition: service_healthy

  asset_service:
    build:
      context: .
      dockerfile: services/asset/Dockerfile
    ports: ["8001:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@postgres_asset:5432/asset_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres_asset:
        condition: service_healthy
      redis:
        condition: service_healthy

  env_service:
    build:
      context: .
      dockerfile: services/environment/Dockerfile
    ports: ["8002:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@timescaledb:5432/env_db
    depends_on:
      timescaledb:
        condition: service_healthy

  sim_service:
    build:
      context: .
      dockerfile: services/simulation/Dockerfile
    ports: ["8003:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@postgres_sim:5432/sim_db
      ASSET_SERVICE_URL: http://asset_service:8000
      ENV_SERVICE_URL: http://env_service:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres_sim:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent_service:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    ports: ["8004:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@postgres_agent:5432/agent_db
      SIM_SERVICE_URL: http://sim_service:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres_agent:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports: ["8007:8000"]
    environment:
      ASSET_SERVICE_URL: http://asset_service:8000
      ENV_SERVICE_URL: http://env_service:8000
      SIM_SERVICE_URL: http://sim_service:8000
      AGENT_SERVICE_URL: http://agent_service:8000
      ACQUISITION_SERVICE_URL: http://acquisition_service:8000
      EDGEMANAGER_SERVICE_URL: http://edgemanager:8000
      JWT_SECRET: dev-secret-change-in-prod
    depends_on: [asset_service, env_service, sim_service, agent_service, acquisition_service, edgemanager]

  postgres_edge:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edge_db
      POSTGRES_USER: hvac
      POSTGRES_PASSWORD: hvac_dev
    ports: ["5438:5432"]
    volumes: [pg_edge:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac -d edge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports: ["1883:1883", "9001:9001"]
    volumes:
      - ./services/edgemanager/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

  edgemanager:
    build:
      context: .
      dockerfile: services/edgemanager/Dockerfile
    ports: ["8006:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hvac:hvac_dev@postgres_edge:5432/edge_db
      MQTT_HOST: mosquitto
      JWT_SECRET: dev-secret-change-in-prod
    depends_on:
      postgres_edge:
        condition: service_healthy
      mosquitto:
        condition: service_started

volumes:
  pg_asset: ~
  tsdb: ~
  pg_sim: ~
  pg_agent: ~
  tsdb_acq: ~
  pg_edge: ~
  mosquitto_data: ~
